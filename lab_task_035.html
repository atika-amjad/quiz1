<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Quiz Game</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
   
    body.light {
      background: #f8f9fa;
      color: #212529;
    }
    body.dark {
      background: #1a1a2e;
      color: #eee;
    }

   
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      border-bottom: 1px solid #dee2e6;
    }
    body.dark .top-bar { border-color: #333; }

    .top-bar .title {
      font-size: 1.3rem;
      font-weight: 600;
    }
    .toggle-btn {
      background: none;
      border: 1px solid #aaa;
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      color: inherit;
    }
    body.dark .toggle-btn { border-color: #666; }

    .seg-bar {
      display: flex;
      gap: 4px;
      height: 8px;
      margin: 10px 0 6px;
    }
    .seg {
      flex: 1;
      border-radius: 99px;
      background: #dee2e6;
      transition: background 0.3s;
    }
    body.dark .seg { background: #333; }
    .seg.correct  { background: #28a745; }
    .seg.wrong    { background: #dc3545; }
    .seg.skipped  { background: #6c757d; }
    .seg.active   { background: #007bff; }

   
    .quiz-card {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 24px;
      max-width: 560px;
      margin: 30px auto;
    }
    body.dark .quiz-card {
      background: #16213e;
      border-color: #333;
    }

  
    #startPage {
      text-align: center;
      max-width: 560px;
      margin: 60px auto;
      padding: 0 16px;
    }
    #startPage h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 14px;
    }
    .btn-start {
      background: #007bff;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 28px;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-start:hover { background: #0056b3; }

    .q-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 0.85rem;
      color: #555;
    }
    body.dark .q-meta { color: #aaa; }
    .time-left { color: #dc3545 !important; font-weight: 600; }

    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .opt-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      padding: 11px 16px;
      margin-bottom: 10px;
      font-size: 0.88rem;
      cursor: pointer;
      color: #212529;
      transition: background 0.15s, border-color 0.15s;
    }
    body.dark .opt-btn {
      background: #0f3460;
      border-color: #444;
      color: #eee;
    }
    .opt-btn:hover:not(:disabled) {
      background: #e8f0fe;
      border-color: #007bff;
    }
    body.dark .opt-btn:hover:not(:disabled) {
      background: #1a4a8a;
      border-color: #007bff;
    }
    .opt-btn.selected { background: #cfe2ff; border-color: #007bff; }
    body.dark .opt-btn.selected { background: #1a4a8a; }
    .opt-btn.correct  { background: #d1e7dd !important; border-color: #28a745 !important; color: #155724 !important; }
    .opt-btn.wrong    { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }
    .opt-btn:disabled { cursor: default; }


    .nav-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 18px;
      gap: 10px;
    }
    .btn-prev {
      background: #6c757d;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px 20px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .btn-prev:hover:not(:disabled) { background: #5a6268; }
    .btn-prev:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-next {
      background: #28a745;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 9px 22px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .btn-next:hover:not(:disabled) { background: #1e7e34; }
    .btn-next:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── RESULT PAGE ── */
    #resultPage {
      max-width: 620px;
      margin: 30px auto;
      padding: 0 16px;
    }
    #resultPage h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
    #resultPage .score-line { font-size: 0.95rem; margin-bottom: 18px; color: #555; }
    body.dark #resultPage .score-line { color: #aaa; }

    .result-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
      margin-bottom: 20px;
    }
    .result-table th {
      background: #f0f0f0;
      padding: 8px 10px;
      text-align: left;
      border: 1px solid #dee2e6;
      font-weight: 600;
    }
    body.dark .result-table th { background: #1e3a5f; border-color: #444; }
    .result-table td {
      padding: 8px 10px;
      border: 1px solid #dee2e6;
      vertical-align: top;
    }
    body.dark .result-table td { border-color: #444; }
    .result-table tr.row-correct td { background: #d1e7dd; color: #155724; }
    .result-table tr.row-wrong   td { background: #f8d7da; color: #721c24; }
    .result-table tr.row-skip    td { background: #fff3cd; color: #664d03; }
    body.dark .result-table tr.row-correct td { background: #1a4a2e; color: #a3d9b1; }
    body.dark .result-table tr.row-wrong   td { background: #4a1a1a; color: #f5a0a0; }
    body.dark .result-table tr.row-skip    td { background: #3a3010; color: #e0cc88; }

    .res-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-restart {
      background: #007bff; color: #fff;
      border: none; border-radius: 6px;
      padding: 10px 22px; font-size: 0.85rem; cursor: pointer;
    }
    .btn-restart:hover { background: #0056b3; }
    .btn-pdf {
      background: #17a2b8; color: #fff;
      border: none; border-radius: 6px;
      padding: 10px 22px; font-size: 0.85rem; cursor: pointer;
    }
    .btn-pdf:hover { background: #117a8b; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .quiz-card { padding: 16px; margin: 16px; }
      #startPage, #resultPage { margin: 20px auto; }
      .question-text { font-size: 0.95rem; }
    }
  </style>
</head>
<body class="light">


<div class="top-bar">
  <div class="title">🌙 Quiz Application</div>
  <button class="toggle-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark</button>
</div>


<div id="startPage">
  <div class="seg-bar" id="startBar"></div>
  <h2>Quiz Application</h2>
  <p style="color:#666;font-size:0.9rem">Test your JavaScript knowledge with 5 randomized questions.</p>
  <button class="btn-start" onclick="startQuiz()">Start Quiz</button>
</div>


<div id="quizPage" class="hidden">
  <div class="quiz-card">

    <!-- Segmented bar -->
    <div class="seg-bar" id="segBar"></div>

    <!-- Meta row -->
    <div class="q-meta">
      <span id="qMeta">Question 1 / 5</span>
      <span class="time-left" id="timerText">Time Left: 15s</span>
    </div>

    <!-- Question -->
    <div class="question-text" id="questionText"></div>

    <!-- Options -->
    <div id="optionsDiv"></div>

    <!-- Nav buttons -->
    <div class="nav-row">
      <button class="btn-prev" id="btnPrev" onclick="goPrev()">← Previous</button>
      <button class="btn-next" id="btnNext" onclick="goNext()">Next →</button>
    </div>

  </div>
</div>

<!-- ══ RESULT PAGE ══ -->
<div id="resultPage" class="hidden">
  <div class="seg-bar" id="resBar"></div>
  <h3>Quiz Completed!</h3>
  <div class="score-line" id="scoreLine">Your Score: 0 / 5</div>

  <table class="result-table">
    <thead>
      <tr>
        <th>#</th>
        <th>Question</th>
        <th>Your Answer</th>
        <th>Correct Answer</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>

  <div class="res-btns">
    <button class="btn-restart" onclick="restartQuiz()">Restart Quiz</button>
    <button class="btn-pdf"     onclick="downloadPDF()">Download Result PDF</button>
  </div>
</div>

<script>
/* ══════════════════════════════
   QUESTION BANK (10 → pick 5)
══════════════════════════════ */
const BANK = [
  { q:"Which method selects element by ID in JavaScript?",
    opts:["getElementsByClassName()","querySelectorAll()","selectID()","getElementById()"], ans:3 },
  { q:"Which method removes the last element of an array?",
    opts:["push()","pop()","shift()","splice()"], ans:1 },
  { q:"What does '===' check in JavaScript?",
    opts:["Value only","Type only","Value AND type","Neither"], ans:2 },
  { q:"Which keyword declares a block-scoped variable?",
    opts:["var","int","let","define"], ans:2 },
  { q:"What does DOM stand for?",
    opts:["Data Object Model","Document Object Model","Dynamic Order Map","Document Oriented Method"], ans:1 },
  { q:"Which CSS property changes text color?",
    opts:["font-color","text-color","color","foreground"], ans:2 },
  { q:"Which event fires when a page fully loads?",
    opts:["onstart","onload","onready","onopen"], ans:1 },
  { q:"Which JS method converts JSON string to object?",
    opts:["JSON.stringify()","JSON.parse()","JSON.convert()","JSON.toObject()"], ans:1 },
  { q:"What does 'NaN' stand for?",
    opts:["Not a Number","Null and None","Negative and Nil","No assigned Name"], ans:0 },
  { q:"Which array method adds element to the END?",
    opts:["unshift()","append()","push()","add()"], ans:2 }
];

const TOTAL   = 5;
const TIMER_S = 15;

let questions   = [];
let currentQ    = 0;
let score       = 0;
let userAnswers = []; // undefined / -1 / index
let revealed    = [];
let segStatus   = []; // 'pending'|'correct'|'wrong'|'skipped'
let timerInv    = null;
let timeLeft    = TIMER_S;

/* ── THEME ── */
let dark = false;
function toggleTheme() {
  dark = !dark;
  document.body.className = dark ? 'dark' : 'light';
  document.getElementById('themeBtn').textContent = dark ? '☀️ Light' : '🌙 Dark';
  document.querySelector('.top-bar .title').textContent =
    (dark ? '☀️' : '🌙') + ' Quiz Application';
}

/* ── HELPERS ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

/* ── BUILD START BAR ── */
function buildStartBar() {
  const bar = document.getElementById('startBar');
  bar.innerHTML = '';
  const colors = ['#007bff','#28a745','#ffc107','#dc3545','#6f42c1'];
  for (let i=0;i<TOTAL;i++) {
    const s = document.createElement('div');
    s.className = 'seg';
    s.style.background = colors[i];
    bar.appendChild(s);
  }
}

/* ── START ── */
function startQuiz() {
  questions   = shuffle(BANK).slice(0, TOTAL);
  currentQ    = 0;
  score       = 0;
  userAnswers = Array(TOTAL).fill(undefined);
  revealed    = Array(TOTAL).fill(false);
  segStatus   = Array(TOTAL).fill('pending');

  hide('startPage');
  hide('resultPage');
  show('quizPage');

  buildSegBar();
  loadQuestion();
}

/* ── SEGMENTED BAR ── */
const SEG_COLORS = ['#007bff','#28a745','#ffc107','#dc3545','#6f42c1'];

function buildSegBar() {
  const bar = document.getElementById('segBar');
  bar.innerHTML = '';
  for (let i=0;i<TOTAL;i++) {
    const s = document.createElement('div');
    s.className = 'seg';
    s.id = `seg${i}`;
    bar.appendChild(s);
  }
}

function updateSegBar() {
  for (let i=0;i<TOTAL;i++) {
    const s = document.getElementById(`seg${i}`);
    s.className = 'seg';
    if (i < currentQ || revealed[i]) {
      // done
      if (segStatus[i]==='correct')  s.classList.add('correct');
      else if (segStatus[i]==='wrong')   s.classList.add('wrong');
      else                               s.classList.add('skipped');
    } else if (i===currentQ) {
      s.style.background = SEG_COLORS[i % SEG_COLORS.length];
    } else {
      s.style.background = '';
    }
  }
}

/* ── LOAD QUESTION ── */
function loadQuestion() {
  clearInterval(timerInv);
  const q = questions[currentQ];

  document.getElementById('qMeta').textContent = `Question ${currentQ+1} / ${TOTAL}`;
  document.getElementById('questionText').textContent = q.q;
  updateSegBar();

  // Options
  const div = document.getElementById('optionsDiv');
  div.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => selectOption(i);
    div.appendChild(btn);
  });


  document.getElementById('btnPrev').disabled = currentQ === 0;

  if (revealed[currentQ]) {
    applyReveal();
    document.getElementById('btnNext').disabled = false;
    document.getElementById('timerText').textContent = 'Time Left: —';
  } else {
    document.getElementById('btnNext').disabled = true;
    startTimer();
  }
}

/* ── TIMER ── */
function startTimer() {
  timeLeft = TIMER_S;
  updateTimerText();
  timerInv = setInterval(() => {
    timeLeft--;
    updateTimerText();
    if (timeLeft <= 0) {
      clearInterval(timerInv);
      onTimerEnd();
    }
  }, 1000);
}
function updateTimerText() {
  const el = document.getElementById('timerText');
  el.textContent = `Time Left: ${timeLeft}s`;
  el.style.color = timeLeft <= 5 ? '#dc3545' : '#dc3545'; 
function onTimerEnd() {
  if (!revealed[currentQ]) {
    markResult(-1);
    applyReveal();
    document.getElementById('btnNext').disabled = false;
  }
  setTimeout(() => goNext(), 900);
}
}
function selectOption(idx) {
  if (revealed[currentQ]) return;
  clearInterval(timerInv);
  markResult(idx);
  applyReveal();
  document.getElementById('btnNext').disabled = false;
}

function markResult(idx) {
  revealed[currentQ]    = true;
  userAnswers[currentQ] = idx;
  const correct = questions[currentQ].ans;
  if (idx === correct) {
    score++;
    segStatus[currentQ] = 'correct';
  } else if (idx === -1) {
    segStatus[currentQ] = 'skipped';
  } else {
    segStatus[currentQ] = 'wrong';
  }
  updateSegBar();
}

/* ── APPLY REVEAL ── */
function applyReveal() {
  clearInterval(timerInv);
  const q   = questions[currentQ];
  const ua  = userAnswers[currentQ];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach((b,i) => {
    b.disabled = true;
    if (i === q.ans)             b.classList.add('correct');
    else if (i === ua && ua>=0)  b.classList.add('wrong');
  });
  document.getElementById('timerText').textContent = 'Time Left: —';
}


function goNext() {
  clearInterval(timerInv);
  if (!revealed[currentQ]) markResult(-1);
  currentQ++;
  if (currentQ >= TOTAL) showResult();
  else loadQuestion();
}

function goPrev() {
  clearInterval(timerInv);
  if (currentQ === 0) return;
  currentQ--;
  loadQuestion();
}

function showResult() {
  hide('quizPage');
  show('resultPage');

  const wrong   = questions.filter((_,i) => {
    const a=userAnswers[i]; return a>=0 && a!==questions[i].ans;
  }).length;
  const skipped = userAnswers.filter(a=>a===undefined||a===-1).length;

  document.getElementById('scoreLine').textContent = `Your Score: ${score} / ${TOTAL}`;

  // Result seg bar
  const resBar = document.getElementById('resBar');
  resBar.innerHTML = '';
  for (let i=0;i<TOTAL;i++) {
    const s = document.createElement('div');
    s.className = 'seg';
    if (segStatus[i]==='correct') s.classList.add('correct');
    else if (segStatus[i]==='wrong') s.classList.add('wrong');
    else s.classList.add('skipped');
    resBar.appendChild(s);
  }

  const tbody = document.getElementById('resultBody');
  tbody.innerHTML = '';
  questions.forEach((q,i) => {
    const ua      = userAnswers[i];
    const isSkip  = ua===undefined||ua===-1;
    const isRight = !isSkip && ua===q.ans;
    const rc = isRight ? 'row-correct' : isSkip ? 'row-skip' : 'row-wrong';
    const st = isRight ? 'Correct' : isSkip ? 'Not Answered' : 'Incorrect';
    const tr = document.createElement('tr');
    tr.className = rc;
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${q.q}</td>
      <td>${isSkip ? 'Not Answered' : q.opts[ua]}</td>
      <td>${q.opts[q.ans]}</td>
      <td>${st}</td>
    `;
    tbody.appendChild(tr);
  });
}

function restartQuiz() {
  hide('resultPage');
  show('startPage');
  buildStartBar();
}


function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W=210, M=15, CW=W-M*2;

 
  doc.setFillColor(0,123,255);
  doc.rect(0,0,W,22,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');
  doc.setFontSize(13);
  doc.text('Quiz Application — Result Report', M, 14);

  doc.setTextColor(0,0,0);
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  const pct = Math.round((score/TOTAL)*100);
  doc.text(`Score: ${score} / ${TOTAL}   (${pct}%)    Date: ${new Date().toLocaleDateString()}`, M, 30);

  let y = 38;
  doc.setFillColor(230,230,230);
  doc.rect(M,y,CW,8,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(8);
  doc.setTextColor(0,0,0);
  const cx = {n:M+2, q:M+12, ya:M+105, ca:M+145, st:M+176};
  doc.text('#',      cx.n,  y+5.5);
  doc.text('Question', cx.q, y+5.5);
  doc.text('Your Answer', cx.ya, y+5.5);
  doc.text('Correct Answer', cx.ca, y+5.5);
  doc.text('Status', cx.st, y+5.5);
  y += 8;

  doc.setFont('helvetica','normal');
  questions.forEach((q,i) => {
    const ua      = userAnswers[i];
    const isSkip  = ua===undefined||ua===-1;
    const isRight = !isSkip&&ua===q.ans;
    const yours   = isSkip ? 'Not Answered' : q.opts[ua];
    const status  = isRight ? 'Correct' : isSkip ? 'Not Answered' : 'Incorrect';

    const qL = doc.splitTextToSize(q.q, 88);
    const yL = doc.splitTextToSize(yours, 36);
    const rH = Math.max(qL.length, yL.length)*4.5+7;

    if (y+rH>278) { doc.addPage(); y=15; }

    if (isRight)     doc.setFillColor(209,231,221);
    else if (isSkip) doc.setFillColor(255,243,205);
    else             doc.setFillColor(248,215,218);
    doc.rect(M,y,CW,rH,'F');
    doc.setDrawColor(200,200,200);
    doc.rect(M,y,CW,rH);

    doc.setTextColor(50,50,50);
    doc.setFontSize(8);
    doc.text(`${i+1}`, cx.n, y+6);
    doc.text(qL, cx.q, y+6);
    doc.text(yL, cx.ya, y+6);

    doc.setTextColor(21,87,36);
    doc.text(doc.splitTextToSize(q.opts[q.ans],27), cx.ca, y+6);

    doc.setFont('helvetica','bold');
    if (isRight)     doc.setTextColor(21,87,36);
    else if (isSkip) doc.setTextColor(102,77,3);
    else             doc.setTextColor(114,28,36);
    doc.text(status, cx.st, y+6);
    doc.setFont('helvetica','normal');

    y += rH;
  });

  doc.save(`quiz_result.pdf`);
}

/* ── INIT ── */
buildStartBar();
</script>
</body>
</html>
